services:
  jenkins:
    image: jenkins/jenkins:lts
    environment:
      - DEBIAN_FRONTEND=noninteractive
    ports:
      - "8080:8080"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ci-network
    user: root
    entrypoint: ["/bin/sh", "-c", "apt-get update && apt-get install -y docker.io && exec /usr/bin/tini -- /usr/local/bin/jenkins.sh"]

  sonarqube:
    image: sonarqube:community
    ports:
      - "9000:9000"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-logs:/opt/sonarqube/logs
      - sonarqube-extensions:/opt/sonarqube/extensions
    networks:
      - ci-network

  nexus:
    image: sonatype/nexus3
    ports:
      - "8081:8081"
    volumes:
      - nexus-data:/nexus-data
    networks:
      - ci-network

volumes:
  jenkins-data:
  sonarqube-data:
  sonarqube-logs:
  sonarqube-extensions:
  nexus-data:

networks:
  ci-network:
    driver: bridge
